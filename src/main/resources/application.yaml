server:
  port: 8080
  servlet:
    context-path: /easymall

spring:
  datasource:
    url: ${DATABASE_URL}
    driver-class-name: "org.postgresql.Driver"
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
    out-of-order: true
    locations: "classpath:db/migration"
    schemas: public
    validate-on-migrate: false
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  security:
    oauth2:
      client:
        registration:
          google:
            # client-id: ${GOOGLE_CLIENT_ID}       # Future: social login
            # client-secret: ${GOOGLE_CLIENT_SECRET}
            # scope:
            #   - email
            #   - profile
  messages:
    basename: messages
    encoding: UTF-8
    cache-duration: 3600

jwt:
  signerKey: ${JWT_SIGNER_KEY}
  valid-duration: 900000 # 15 min (Access Token)
  refreshable-duration: 604800000 # 7 days (Refresh Token)
google:
  api:
    key: ${GOOGLE_API_KEY}
vn-pay:
  tmn-code: ${VNPAY_TMN_CODE}
  hash-secret: ${VNPAY_HASH_SECRET}
  pay-url: ${VNPAY_PAY_URL}
  return-url: ${VNPAY_RETURN_URL}
  api-url: ${VNPAY_API_URL}
  ipn-url: ${VNPAY_IPN_URL}
# login-url:
#   google: ${GOOGLE_LOGIN_URL}   # Future: social login

storage:
  base-url: ${AWS_URL}

logging:
  level:
    org.flywaydb: DEBUG

cors:
  allowed-origins:
    - ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}

ghn:
  token: ${GHN_TOKEN}
  url: ${GHN_API_URL}
  shop-id: ${GHN_SHOP_ID}
  ward-code: ${GHN_WARD_CODE}

aws:
  s3:
    bucket-name: ${AWS_BUCKET}
    region: ${AWS_DEFAULT_REGION}
  credentials:
    access-key: ${AWS_ACCESS_KEY_ID}
    secret-key: ${AWS_SECRET_ACCESS_KEY}
  base-url: ${AWS_URL}
