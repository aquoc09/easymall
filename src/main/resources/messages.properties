# ── Email Messages ───────────────────────────────────────────────────
email.activation.subject=[EasyMall] Activate your account
email.activation.body=Hello!\n\nYour EasyMall account activation OTP is: {0}\n\nThis code is valid for 5 minutes. Please do not share this code with anyone.\n\nBest regards,\nEasyMall Team
email.forgot-password.subject=[EasyMall] Reset your password
email.forgot-password.body=Hello!\n\nYour EasyMall password reset OTP is: {0}\n\nThis code is valid for 5 minutes. If you did not request a password reset, please ignore this email.\n\nBest regards,\nEasyMall Team

